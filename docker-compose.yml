services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - php
    ports:
      - "8080:80"
    volumes:
      - ./oms:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  php:
    build:
      context: ./docker/php
    environment:
      APP_ENV: dev
    volumes:
      - ./oms:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/zz-oms.ini:ro
      - ./docker/php/php-fpm.conf:/usr/local/etc/php-fpm.d/zz-oms.conf:ro
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ./docker/php
    command: ["php", "bin/console", "messenger:consume", "async", "--time-limit=3600", "--memory-limit=128M"]
    environment:
      APP_ENV: dev
    volumes:
      - ./oms:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/zz-oms.ini:ro
      - ./docker/php/php-fpm.conf:/usr/local/etc/php-fpm.d/zz-oms.conf:ro
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: oms
      POSTGRES_USER: oms
      POSTGRES_PASSWORD: oms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
